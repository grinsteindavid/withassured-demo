services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assured
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assured"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 30mb
      --maxmemory-policy allkeys-lru
      --loglevel debug
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  cron:
    image: curlimages/curl:latest
    environment:
      # Cron always reaches the Next.js app on the host port 3000 via
      # host.docker.internal — works whether the app runs in Docker or
      # via `bun run dev` on the host.
      APP_URL: ${APP_URL:-http://host.docker.internal:3000}
      ENDPOINT: /api/cron/compliance
      CRON_SECRET: ${CRON_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      sh -c "while true; do
        echo \"=== \$(date -Iseconds) - Starting compliance check ===\";
        curl -v -H \"Authorization: Bearer $$CRON_SECRET\" \"$$APP_URL$$ENDPOINT\" -w \"\n--- Timing Metrics ---\nTime Total: %{time_total}s\nTime Connect: %{time_connect}s\nTime Start Transfer: %{time_starttransfer}s\n\" || echo \"=== \$(date -Iseconds) - Request failed ===\";
        echo \"=== \$(date -Iseconds) - Sleeping for 300 seconds ===\";
        sleep 300;
      done"

volumes:
  postgres_data:
