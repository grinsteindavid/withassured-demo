services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assured
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assured"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/assured
      JWT_SECRET: ${JWT_SECRET}

      HOSTNAME: "0.0.0.0"
      # macOS bind mounts don't fire inotify events — force polling so
      # Next.js / Turbopack pick up host file changes inside the container.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      CRON_SECRET: ${CRON_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "bunx prisma generate &&
             bunx prisma migrate deploy &&
             bun run db:seed &&
             exec node node_modules/next/dist/bin/next dev"

  cron:
    image: curlimages/curl:latest
    environment:
      APP_URL: http://app:3000
      ENDPOINT: /api/cron/compliance
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      app:
        condition: service_healthy
    command: >
      sh -c "while true; do
        echo \"=== \$(date -Iseconds) - Starting compliance check ===\";
        curl -v -H \"Authorization: Bearer $$CRON_SECRET\" \"$$APP_URL$$ENDPOINT\" -w \"\n--- Timing Metrics ---\nTime Total: %{time_total}s\nTime Connect: %{time_connect}s\nTime Start Transfer: %{time_starttransfer}s\n\" || echo \"=== \$(date -Iseconds) - Request failed ===\";
        echo \"=== \$(date -Iseconds) - Sleeping for 300 seconds ===\";
        sleep 300;
      done"

  studio:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/assured
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "bunx prisma generate && bunx prisma studio --port 5555 --hostname 0.0.0.0"

volumes:
  postgres_data:
